name: Publish Container

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/mybio
  DOCKER_METADATA_SHORT_SHA_LENGTH: 12

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Production build
        run: npm run build

  publish:
    if: github.event_name != 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=sha,format=short,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish deployment hint
        run: |
          echo "Imagem publicada:" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.REGISTRY_IMAGE }}:sha-${GITHUB_SHA::12}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Exemplo de rollout manual:" >> $GITHUB_STEP_SUMMARY
          echo "\`kubectl set image deployment/mybio mybio=${{ env.REGISTRY_IMAGE }}:sha-${GITHUB_SHA::12} -n applications\`" >> $GITHUB_STEP_SUMMARY
