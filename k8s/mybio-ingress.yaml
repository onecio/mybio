apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mybio
  namespace: applications
  labels:
    app: mybio
    app.kubernetes.io/name: mybio
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: mybio-platform
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - mybio.ecomnix.com.br
      secretName: mybio-origin-tls
  rules:
    - host: mybio.ecomnix.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mybio
                port:
                  number: 80
